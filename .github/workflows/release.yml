name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build portable zip (universal — CPU + Vulkan + NVIDIA CUDA)
        run: powershell -ExecutionPolicy Bypass -File scripts/publish-portable.ps1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Gentastic-portable-win-x64.zip
          generate_release_notes: true
