<div id="consent-banner" class="consent-banner" role="region" aria-label="Cookie consent" hidden>
  <div class="consent-inner">
    <p class="consent-text">
      We use <strong>anonymous analytics</strong> cookies (Google Analytics) to understand how the site
      is used. No ads, no cross-site tracking. See our
      <a href="{{ '/privacy/' | relative_url }}">Privacy &amp; Cookies</a> page.
    </p>
    <div class="consent-actions">
      <button type="button" id="consent-reject" class="btn btn-ghost btn-sm">Reject</button>
      <button type="button" id="consent-accept" class="btn btn-primary btn-sm">Accept</button>
    </div>
  </div>
</div>
